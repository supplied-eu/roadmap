name: Refresh Gantt Dashboard

on:
  # Manual trigger only — go to Actions tab → "Refresh Gantt Dashboard" → Run workflow
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for refresh (optional)'
        required: false
        default: 'Manual refresh'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: node scripts/fetch-linear.js

      - name: Fetch data from HubSpot
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: node scripts/fetch-hubspot.js

      # ── Per-user Google data fetching ──────────────────────────────────
      # Each user gets their own google-data-{name}.json file.
      # To add a new user: add GOOGLE_REFRESH_TOKEN_{NAME} as a GitHub Secret
      # and duplicate the step below with --user={name}.
      # Each user needs to do the OAuth consent flow once (see get-refresh-token.js).

      - name: Fetch Google data — Johann
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          node scripts/fetch-google.js --user=johann
          cp google-data-johann.json google-data.json

      - name: Fetch Google data — Julio
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN_JULIO }}
        run: node scripts/fetch-google.js --user=julio
        continue-on-error: true

      - name: Fetch Google data — Bas
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN_BAS }}
        run: node scripts/fetch-google.js --user=bas
        continue-on-error: true

      - name: Fetch data from Leadfeeder (website visitors)
        env:
          LEADFEEDER_API_KEY: ${{ secrets.LEADFEEDER_API_KEY }}
        run: node scripts/fetch-leadfeeder.js

      - name: Build HTML dashboard
        run: node scripts/build-html.js

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html gantt-data.json hubspot-data.json google-data.json google-data-*.json leadfeeder-data.json meeting-summaries.json kpi-data.json wbso-data.json
          git diff --staged --quiet || git commit -m "🔄 Refresh dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin main
          git push
