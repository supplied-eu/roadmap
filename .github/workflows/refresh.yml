name: Refresh Gantt Dashboard

on:
  # Manual trigger only — go to Actions tab → "Refresh Gantt Dashboard" → Run workflow
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for refresh (optional)'
        required: false
        default: 'Manual refresh'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: node scripts/fetch-linear.js

      - name: Fetch data from HubSpot
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: node scripts/fetch-hubspot.js
        # If HUBSPOT_API_KEY is not set, fetch-hubspot.js writes an empty
        # hubspot-data.json and exits 0, so this step never blocks the build.

      - name: Fetch data from Google (Gmail, Calendar, Drive)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          node scripts/fetch-google.js
          # Copy to person-specific file so the dashboard loads Johann's fresh data
          # (dashboard prefers google-data-{name}.json over google-data.json)
          cp google-data.json google-data-johann.json
        # If Google secrets are not set, fetch-google.js preserves the existing
        # google-data.json and exits 0, so this step never blocks the build.

      - name: Fetch data from Leadfeeder (website visitors)
        env:
          LEADFEEDER_API_KEY: ${{ secrets.LEADFEEDER_API_KEY }}
        run: node scripts/fetch-leadfeeder.js
        # If LEADFEEDER_API_KEY is not set, writes empty leadfeeder-data.json and exits 0.

      - name: Build HTML dashboard
        run: node scripts/build-html.js

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html gantt-data.json hubspot-data.json google-data.json google-data-johann.json leadfeeder-data.json
          git diff --staged --quiet || git commit -m "🔄 Refresh dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X theirs origin main
          git push
